openapi: 3.0.3
info:
  title: VoIP.ms API
  description: |-
    OpenAPI specification for the VoIP.ms API. This spec includes authentication and several DID-related endpoints as examples. Extend as needed for other endpoints.
  version: 1.0.0
servers:
  - url: https://voip.ms/api/v1/rest.php/
    description: Production server
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  parameters:
    ApiUsername:
      name: api_username
      in: query
      required: true
      schema:
        type: string
      description: Email used to login to VoIP.ms portal
    ApiPassword:
      name: api_password
      in: query
      required: true
      schema:
        type: string
      description: Password created for the API
    DIDNumber:
      name: did
      in: query
      required: false
      schema:
        type: string
      description: Specific DID number
paths:
  getDIDsInfo:
    get:
      summary: Get DIDs Info
      description: Retrieves information from all your DIDs
      operationId: getDIDsInfo
      parameters:
        - $ref: '#/components/parameters/ApiUsername'
        - $ref: '#/components/parameters/ApiPassword'
        - name: method
          in: query
          required: true
          schema:
            type: string
            enum: [getDIDsInfo]
          description: API method to call
        - $ref: '#/components/parameters/DIDNumber'
        - name: reseller_client_id
          in: query
          required: false
          schema:
            type: string
          description: Reseller Client ID to filter DIDs (returns reseller client's DIDs)
        - name: subaccount
          in: query
          required: false
          schema:
            type: string
          description: Sub account identifier to filter DIDs
        - name: include_sms
          in: query
          required: false
          schema:
            type: boolean
          description: If true, include SMS-related information when available
      responses:
        '200':
          description: DID information
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  dids:
                    type: array
                    items:
                      type: object
                      properties:
                        did:
                          type: string
                        owner_type:
                          type: string
                          description: Owner type (account, reseller_client, subaccount)
                        reseller_client_id:
                          type: string
                        subaccount:
                          type: string
                        info:
                          type: object
                        sms_info:
                          type: object
                          description: SMS-related data if available
        '400':
          description: Invalid request
  getBalance:
    get:
      summary: Get Account Balance
      description: Retrieves the account balance for the authenticated account.
      operationId: getBalance
      parameters:
        - $ref: '#/components/parameters/ApiUsername'
        - $ref: '#/components/parameters/ApiPassword'
        - name: method
          in: query
          required: true
          schema:
            type: string
            enum: [getBalance]
          description: API method to call
        - name: detailed
          in: query
          required: false
          schema:
            type: boolean
          description: If true, include detailed breakdown of balances
      responses:
        '200':
          description: Account balance information
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  balance:
                    type: string
                    description: Account balance as a string to preserve formatting
                  currency:
                    type: string
                  last_updated:
                    type: string
                    format: date-time
                  details:
                    type: object
                    description: Optional detailed breakdown when requested
        '400':
          description: Invalid request
  createSubAccount:
    get:
      summary: Create Sub Account
      description: Creates a sub-account under the authenticated account (or reseller client) with provided credentials.
      operationId: createSubAccount
      parameters:
        - $ref: '#/components/parameters/ApiUsername'
        - $ref: '#/components/parameters/ApiPassword'
        - name: method
          in: query
          required: true
          schema:
            type: string
            enum: [createSubAccount]
          description: API method to call
        - name: reseller_client_id
          in: query
          required: false
          schema:
            type: string
          description: Reseller Client ID when creating the subaccount under a reseller
        - name: subaccount
          in: query
          required: true
          schema:
            type: string
          description: Subaccount identifier (username)
        - name: password
          in: query
          required: true
          schema:
            type: string
          description: Password for the created subaccount
        - name: email
          in: query
          required: false
          schema:
            type: string
            format: email
          description: Contact email for the subaccount
      responses:
        '200':
          description: Subaccount created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  subaccount_id:
                    type: string
                  description:
                    type: string
        '400':
          description: Invalid request
  delSubAccount:
    get:
      summary: Delete Sub Account
      description: Deletes a sub-account identified by its username or id.
      operationId: delSubAccount
      parameters:
        - $ref: '#/components/parameters/ApiUsername'
        - $ref: '#/components/parameters/ApiPassword'
        - name: method
          in: query
          required: true
          schema:
            type: string
            enum: [delSubAccount]
          description: API method to call
        - name: reseller_client_id
          in: query
          required: false
          schema:
            type: string
          description: Reseller Client ID when deleting subaccount under a reseller
        - name: subaccount
          in: query
          required: true
          schema:
            type: string
          description: Subaccount identifier (username or id) to delete
      responses:
        '200':
          description: Subaccount deletion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  deleted:
                    type: boolean
                  description:
                    type: string
        '400':
          description: Invalid request
  sendSMS:
    get:
      summary: Send SMS
      description: Sends an SMS message from one of your DIDs to a destination number.
      operationId: sendSMS
      parameters:
        - $ref: '#/components/parameters/ApiUsername'
        - $ref: '#/components/parameters/ApiPassword'
        - name: method
          in: query
          required: true
          schema:
            type: string
            enum: [sendSMS]
          description: API method to call
        - name: from
          in: query
          required: true
          schema:
            type: string
          description: Originating DID (your number)
        - name: to
          in: query
          required: true
          schema:
            type: string
          description: Destination phone number
        - name: message
          in: query
          required: true
          schema:
            type: string
          description: Message text (UTF-8)
        - name: coding
          in: query
          required: false
          schema:
            type: string
            enum: [text, unicode]
          description: Message coding (text or unicode)
      responses:
        '200':
          description: SMS send result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message_id:
                    type: string
                  description:
                    type: string
        '400':
          description: Invalid request
security:
  - basicAuth: []