openapi: 2.0.0
info:
  title: VoIP.ms API
  description: |
    Complete OpenAPI (YAML) specification stub for the VoIP.ms REST/JSON API.
    Each API function is exposed as a GET endpoint path that accepts the
    standard `api_username` and `api_password` query parameters plus a
    `method` parameter that matches the function name. Parameters specific to
    each function are listed where obvious; responses are concise stubs you
    can expand with real schemas.
  version: 1.0.0
servers:
  - url: https://voip.ms/api/v1/rest.php
    description: VoIP.ms REST API endpoint. Each path (e.g. /getBalance) is exposed as a unique action for tooling. At runtime VoIP.ms resolves calls by the method query parameter; the path segment is used to create distinct entries in tools like Budibase.
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  parameters:
    ApiUsername:
      name: api_username
      in: query
      required: true
      schema:
        type: string
      description: Email used to login to VoIP.ms portal
    ApiPassword:
      name: api_password
      in: query
      required: true
      schema:
        type: string
      description: Password created for the API
    MethodParam:
      name: method
      in: query
      required: false
      schema:
        type: string
      description: |
        API method name. When using the legacy single-endpoint form (rest.php?method=...),
        provide this query parameter. When using the per-path form (e.g. server
        URL includes /api/v1/rest.php and the path is /getBalance) this parameter
        is optional and may be omitted. Marked optional to allow tooling imports
        that expose each function as its own path.
    DIDNumber:
      name: did
      in: query
      required: false
      schema:
        type: string
      description: Specific DID number
paths:
  /getBalance:
    get:
      summary: getBalance
      description: Retrieves Balance for your Account or advanced stats if `advanced=true`.
      operationId: getBalance
      parameters:
        - $ref: '#/components/parameters/ApiUsername'
        - $ref: '#/components/parameters/ApiPassword'
        - name: method
          in: query
          required: false
          schema:
            type: string
            enum: [getBalance]
          default: getBalance
        - name: advanced
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Balance returned
        '400':
          description: Invalid request
