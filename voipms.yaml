openapi: 3.0.3
info:
  title: VoIP.ms API
  description: |-
    OpenAPI specification for the VoIP.ms API. This spec includes authentication and several DID-related endpoints as examples. Extend as needed for other endpoints.
  version: 1.0.0
servers:
  - url: https://voip.ms/api/v1/rest.php
    description: Production server
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  parameters:
    ApiUsername:
      name: api_username
      in: query
      required: true
      schema:
        type: string
      description: Email used to login to VoIP.ms portal
    ApiPassword:
      name: api_password
      in: query
      required: true
      schema:
        type: string
      description: Password created for the API
    DIDNumber:
      name: did
      in: query
      required: false
      schema:
        type: string
      description: Specific DID number
paths:
  /:
    get:
      summary: Get Canadian DIDs
      description: Retrieves a list of Canadian DIDs by Province and Ratecenter.
      operationId: getDIDsCAN
      parameters:
        - $ref: '#/components/parameters/ApiUsername'
        - $ref: '#/components/parameters/ApiPassword'
        - name: method
          in: query
          required: true
          schema:
            type: string
            enum: [getDIDsCAN]
          description: API method to call
        - name: province
          in: query
          required: false
          schema:
            type: string
          description: Canadian province abbreviation (e.g., ON, QC)
        - name: ratecenter
          in: query
          required: false
          schema:
            type: string
          description: Ratecenter name
      responses:
        '200':
          description: List of Canadian DIDs
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  dids:
                    type: array
                    items:
                      type: object
                      properties:
                        did:
                          type: string
                        province:
                          type: string
                        ratecenter:
                          type: string
        '400':
          description: Invalid request
  /getDIDsUSA:
    get:
      summary: Get USA DIDs
      description: Retrieves a list of USA DIDs by State and Ratecenter.
      operationId: getDIDsUSA
      parameters:
        - $ref: '#/components/parameters/ApiUsername'
        - $ref: '#/components/parameters/ApiPassword'
        - name: method
          in: query
          required: true
          schema:
            type: string
            enum: [getDIDsUSA]
          description: API method to call
        - name: state
          in: query
          required: false
          schema:
            type: string
          description: US state abbreviation (e.g., NY, CA)
        - name: ratecenter
          in: query
          required: false
          schema:
            type: string
          description: Ratecenter name
      responses:
        '200':
          description: List of USA DIDs
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  dids:
                    type: array
                    items:
                      type: object
                      properties:
                        did:
                          type: string
                        state:
                          type: string
                        ratecenter:
                          type: string
        '400':
          description: Invalid request
  /getDIDsInfo:
    get:
      summary: Get DIDs Info
      description: Retrieves information from all your DIDs or a specific DID if provided.
      operationId: getDIDsInfo
      parameters:
        - $ref: '#/components/parameters/ApiUsername'
        - $ref: '#/components/parameters/ApiPassword'
        - name: method
          in: query
          required: true
          schema:
            type: string
            enum: [getDIDsInfo]
          description: API method to call
        - $ref: '#/components/parameters/DIDNumber'
      responses:
        '200':
          description: DID information
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  dids:
                    type: array
                    items:
                      type: object
                      properties:
                        did:
                          type: string
                        info:
                          type: object
        '400':
          description: Invalid request
security:
  - basicAuth: []